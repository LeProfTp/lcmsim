<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LCM Communication Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff; color: #000; line-height: 1.6; }
    
    .journey-map {
      display: flex;
      gap: 0.5rem;
      margin: 1.5rem 0;
      padding: 1rem;
      background: #f9f9f9;
      border-radius: 4px;
    }
    .stage-dot {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #e0e0e0;
      border: 2px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 600;
      color: #666;
      flex-shrink: 0;
      transition: all 0.3s;
    }
    .stage-dot.active { background: #000; color: #fff; border-color: #000; }
    .stage-dot.passed { background: #ccc; color: #fff; border-color: #aaa; }
    .stage-connector {
      flex: 1;
      height: 2px;
      background: #ddd;
      margin-top: 19px;
      transition: background 0.3s;
    }
    .stage-connector.passed { background: #999; }
    
    .container { max-width: 800px; margin: 0 auto; padding: 2rem; min-height: 100vh; }
    
    .screen { display: none; }
    .screen.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    
    h1 { font-size: 1.6rem; margin-bottom: 0.3rem; font-weight: 700; }
    h2 { font-size: 1.2rem; margin: 1.3rem 0 0.6rem 0; font-weight: 600; }
    p { margin-bottom: 0.8rem; }
    
    .mission-label { font-size: 0.75rem; color: #999; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 700; margin-bottom: 0.5rem; }
    .mission-title { font-size: 1.4rem; font-weight: 700; color: #000; margin-bottom: 1rem; }
    
    .section-box { background: #fafafa; border-left: 4px solid #000; padding: 1rem; margin: 1rem 0; border-radius: 2px; }
    .section-box strong { display: block; margin-bottom: 0.4rem; color: #000; }
    .section-box p { margin: 0; font-size: 0.95rem; }
    
    .achievement-card {
      background: linear-gradient(135deg, #f9f9f9 0%, #f5f5f5 100%);
      border: 2px solid #000;
      border-radius: 4px;
      padding: 1rem;
      margin: 1rem 0;
      text-align: center;
    }
    .achievement-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .achievement-title { font-weight: 700; font-size: 1.05rem; margin-bottom: 0.3rem; }
    .achievement-desc { font-size: 0.9rem; color: #666; }
    
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-weight: 500; margin-bottom: 0.3rem; font-size: 0.95rem; }
    input[type="text"], input[type="number"], select, textarea {
      width: 100%;
      padding: 0.65rem;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-family: inherit;
      font-size: 0.95rem;
      background: #fafafa;
    }
    textarea { resize: vertical; min-height: 70px; font-family: monospace; font-size: 0.8rem; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #000; background: #fff; }
    
    .button-group { display: flex; gap: 1rem; margin-top: 1.5rem; justify-content: space-between; flex-wrap: wrap; }
    button {
      padding: 0.65rem 1.3rem;
      border: 1px solid #000;
      background: #000;
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 3px;
      transition: all 0.2s;
    }
    button:hover { background: #333; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: #fff; color: #000; border: 1px solid #ccc; }
    .btn-secondary:hover { background: #f5f5f5; }
    .btn-copy { padding: 0.4rem 0.9rem; font-size: 0.85rem; }
    
    .code-block { background: #f5f5f5; border-left: 3px solid #000; padding: 0.8rem; margin: 0.8rem 0; overflow-x: auto; font-family: monospace; font-size: 0.75rem; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
    
    .mode-selector { display: flex; gap: 1rem; margin: 1rem 0; }
    .mode-btn { flex: 1; padding: 1rem; border: 2px solid #ccc; background: #fff; cursor: pointer; border-radius: 4px; text-align: center; font-weight: 600; transition: all 0.2s; }
    .mode-btn:hover { border-color: #000; }
    .mode-btn.selected { border-color: #000; background: #000; color: #fff; }
    
    .rating-group { margin-bottom: 0.9rem; }
    .rating-label { display: flex; justify-content: space-between; font-size: 0.88rem; margin-bottom: 0.3rem; }
    .rating-scale { display: flex; gap: 0.25rem; }
    .rating-btn { width: 32px; height: 32px; padding: 0; border: 1px solid #ccc; background: #fff; cursor: pointer; font-weight: 600; font-size: 0.75rem; }
    .rating-btn:hover { border-color: #000; }
    .rating-btn.selected { background: #000; color: #fff; }
    
    .completion-card { background: #f0f0f0; border: 2px solid #000; border-radius: 4px; padding: 1.5rem; margin: 1rem 0; text-align: center; }
    .completion-card h2 { margin-top: 0; }
    .completion-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-top: 1rem; }
    .completion-opt { padding: 1rem; background: #fff; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
    .completion-opt:hover { border-color: #000; }
    
    .success-msg { background: #f0f0f0; border-left: 3px solid #000; padding: 0.8rem; margin: 0.8rem 0; }
    
    .experience-card {
      background: linear-gradient(135deg, #f9f9f9 0%, #f5f5f5 100%);
      border: 2px solid #000;
      border-radius: 4px;
      padding: 1.2rem;
      margin: 1rem 0;
    }
    .experience-field { margin-bottom: 0.8rem; }
    .experience-field strong { display: block; font-size: 0.85rem; color: #666; margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .experience-field p { margin: 0; font-size: 0.9rem; }
  </style>
</head>
<body>

<div class="container">

  <!-- Screen 0: Language -->
  <div class="screen active" id="screen0">
    <h1 style="margin-top: 2rem; text-align: center;">LCM Communication Explorer</h1>
    <p style="margin: 1.5rem 0; color: #666; text-align: center;">Choose your language / Wähle deine Sprache</p>
    <div style="display: flex; gap: 1rem; max-width: 300px; margin: 0 auto;">
      <button onclick="setLanguage('DE')" style="flex: 1;">Deutsch</button>
      <button onclick="setLanguage('EN')" style="flex: 1;">English</button>
    </div>
  </div>

  <!-- Screen 1: Welcome -->
  <div class="screen" id="screen1">
    <div class="journey-map" id="journeyMap1"></div>
    <h1 id="h1"></h1>
    <div class="section-box" id="welcomeBox"></div>
    <div class="button-group">
      <button onclick="goToScreen(2)">Start Mission →</button>
    </div>
  </div>

  <!-- Screen 2: Mode Selection -->
  <div class="screen" id="screen2">
    <div class="journey-map" id="journeyMap2"></div>
    <h1 id="h2"></h1>
    <p id="p2desc"></p>
    <div class="mode-selector">
      <button class="mode-btn" onclick="selectMode('light')" id="modeLight">
        <div style="font-size: 1rem; margin-bottom: 0.5rem;">🔍</div>
        <div style="font-size: 0.9rem; margin-bottom: 0.3rem;">LCM-Light</div>
        <div style="font-size: 0.75rem; color: #666;">3 Missionen</div>
      </button>
      <button class="mode-btn" onclick="selectMode('extended')" id="modeExtended">
        <div style="font-size: 1rem; margin-bottom: 0.5rem;">🗺️</div>
        <div style="font-size: 0.9rem; margin-bottom: 0.3rem;">LCM Extended</div>
        <div style="font-size: 0.75rem; color: #666;">5 Missionen</div>
      </button>
    </div>
    <div class="button-group">
      <button class="btn-secondary" onclick="goToScreen(1)">← Back</button>
      <button onclick="goToScreen(3)" id="btn2" disabled>Next →</button>
    </div>
  </div>

  <!-- Screen 3-5: Setup (Consent, Info, LLM) -->
  <div class="screen" id="screen3">
    <div class="journey-map" id="journeyMap3"></div>
    <h1 id="h3"></h1>
    <div class="section-box" id="consentBox"></div>
    <div class="form-group">
      <label><input type="checkbox" id="consent"> <span id="consentLabel"></span></label>
    </div>
    <div class="button-group">
      <button class="btn-secondary" onclick="goToScreen(2)">← Back</button>
      <button onclick="goToScreen(4)" id="btn3" disabled>Next →</button>
    </div>
  </div>

  <div class="screen" id="screen4">
    <div class="journey-map" id="journeyMap4"></div>
    <h1 id="h4"></h1>
    <div class="form-group">
      <label id="lAge"></label>
      <input type="number" id="age" min="18" max="120">
    </div>
    <div class="form-group">
      <label id="lAiExp"></label>
      <select id="aiExp"></select>
    </div>
    <div class="button-group">
      <button class="btn-secondary" onclick="goToScreen(3)">← Back</button>
      <button onclick="goToScreen(5)" id="btn4" disabled>Next →</button>
    </div>
  </div>

  <div class="screen" id="screen5">
    <div class="journey-map" id="journeyMap5"></div>
    <h1 id="h5"></h1>
    <div class="form-group">
      <label id="lLlm"></label>
      <select id="llmSelect">
        <option value="">-- Choose --</option>
        <option value="ChatGPT">ChatGPT</option>
        <option value="Claude">Claude</option>
        <option value="Gemini">Gemini</option>
        <option value="Grok">Grok</option>
        <option value="Perplexity">Perplexity</option>
        <option value="DeepSeek">DeepSeek</option>
        <option value="Qwen">Qwen</option>
        <option value="Mistral">Mistral</option>
        <option value="Kimi">Kimi</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="form-group" id="otherLLMGroup" style="display: none;">
      <input type="text" id="otherLLM" placeholder="Model name">
    </div>
    <div class="button-group">
      <button class="btn-secondary" onclick="goToScreen(4)">← Back</button>
      <button onclick="goToScreen(6)" id="btn5" disabled>Begin Journey →</button>
    </div>
  </div>

  <!-- Screen 6: Mission Context -->
  <div class="screen" id="screen6">
    <div class="journey-map" id="journeyMap6"></div>
    <div class="mission-label" id="missionLabel6"></div>
    <h1 id="h6"></h1>
    <div class="section-box" id="missionBox6"></div>
    <div class="code-block" id="scenario6"></div>
    <div class="button-group">
      <button class="btn-secondary" onclick="goToScreen(5)">← Back</button>
      <button onclick="goToScreen(7)">Start Missions →</button>
    </div>
  </div>

  <!-- Screen 7: Partner Model -->
  <div class="screen" id="screen7">
    <div class="journey-map" id="journeyMap7"></div>
    <div class="mission-label" id="missionLabel7"></div>
    <h1 id="h7"></h1>
    <div class="section-box" id="whyBox7"></div>
    <h2 id="h7task"></h2>
    <p id="p7task"></p>
    <div class="code-block" id="prompt7"></div>
    <button class="btn-copy" onclick="copyToClipboard('prompt7')">📋 Copy Prompt</button>
    <div class="form-group">
      <label id="lOutput7"></label>
      <textarea id="output7"></textarea>
    </div>
    <div class="button-group">
      <button class="btn-secondary" onclick="goToScreen(6)">← Back</button>
      <button onclick="goToScreen(8)" id="btn7" disabled>Next →</button>
    </div>
  </div>

  <!-- Screen 8: Self Model -->
  <div class="screen" id="screen8">
    <div class="journey-map" id="journeyMap8"></div>
    <div class="mission-label" id="missionLabel8"></div>
    <h1 id="h8"></h1>
    <div class="section-box" id="whyBox8"></div>
    <h2 id="h8task"></h2>
    <p id="p8task"></p>
    <div class="code-block" id="prompt8"></div>
    <button class="btn-copy" onclick="copyToClipboard('prompt8')">📋 Copy Prompt</button>
    <div class="form-group">
      <label id="lOutput8"></label>
      <textarea id="output8"></textarea>
    </div>
    <div class="button-group">
      <button class="btn-secondary" onclick="goToScreen(7)">← Back</button>
      <button onclick="goToScreen(9)" id="btn8" disabled>Next →</button>
    </div>
  </div>

  <!-- Screen 9: Communication Model (Extended only) -->
  <div class="screen" id="screen9">
    <div class="journey-map" id="journeyMap9"></div>
    <div class="mission-label" id="missionLabel9"></div>
    <h1 id="h9"></h1>
    <div class="section-box" id="whyBox9"></div>
    <h2 id="h9task"></h2>
    <p id="p9task"></p>
    <div class="code-block" id="prompt9"></div>
    <button class="btn-copy" onclick="copyToClipboard('prompt9')">📋 Copy Prompt</button>
    <div class="form-group">
      <label id="lOutput9"></label>
      <textarea id="output9"></textarea>
    </div>
    <div class="button-group">
      <button class="btn-secondary" onclick="goToScreen(8)">← Back</button>
      <button onclick="goToScreen(10)" id="btn9" disabled>Next →</button>
    </div>
  </div>

  <!-- Screen 10: Reflected Agent -->
  <div class="screen" id="screen10">
    <div class="journey-map" id="journeyMap10"></div>
    <div class="mission-label" id="missionLabel10"></div>
    <h1 id="h10"></h1>
    <div class="code-block" id="prompt10"></div>
    <button class="btn-copy" onclick="copyToClipboard('prompt10')">📋 Copy Prompt</button>
    <div class="form-group">
      <label id="lOutput10"></label>
      <textarea id="output10"></textarea>
    </div>
    <div class="button-group">
      <button class="btn-secondary" onclick="goToScreen(9)">← Back</button>
      <button onclick="goToScreen(11)" id="btn10" disabled>Next →</button>
    </div>
  </div>

  <!-- Screen 11: Evaluation Intro -->
  <div class="screen" id="screen11">
    <div class="journey-map" id="journeyMap11"></div>
    <h1 id="h11"></h1>
    <div class="section-box" id="evalIntroBox"></div>
    <div class="button-group">
      <button class="btn-secondary" onclick="goToScreen(10)">← Back</button>
      <button onclick="goToScreen(12)">Start Evaluation →</button>
    </div>
  </div>

  <!-- Screen 12: Ratings -->
  <div class="screen" id="screen12">
    <div class="journey-map" id="journeyMap12"></div>
    <h1 id="h12"></h1>
    <p id="p12inst"></p>
    <div id="ratingContainer"></div>
    <div class="button-group">
      <button class="btn-secondary" onclick="goToScreen(11)">← Back</button>
      <button onclick="goToScreen(13)" id="btn12" disabled>Next →</button>
    </div>
  </div>

  <!-- Screen 13: Reflection Intro -->
  <div class="screen" id="screen13">
    <div class="journey-map" id="journeyMap13"></div>
    <h1 id="h13"></h1>
    <div class="section-box" id="reflectIntroBox"></div>
    <div class="form-group">
      <textarea id="feedback" placeholder="Your thoughts..."></textarea>
    </div>
    <div class="button-group">
      <button class="btn-secondary" onclick="goToScreen(12)">← Back</button>
      <button id="btn13next" onclick="goToScreen(14)">Next →</button>
    </div>
  </div>

  <!-- Screen 14: Experience Store (Extended only) -->
  <div class="screen" id="screen14">
    <div class="journey-map" id="journeyMap14"></div>
    <div class="mission-label" id="missionLabel14"></div>
    <h1 id="h14"></h1>
    <div class="section-box" id="whyBox14"></div>
    <h2 id="h14task"></h2>
    <p id="p14task"></p>
    <div class="code-block" id="prompt14"></div>
    <button class="btn-copy" onclick="copyToClipboard('prompt14')">📋 Copy Prompt</button>
    <div class="form-group">
      <label id="lOutput14"></label>
      <textarea id="output14"></textarea>
    </div>
    <div class="button-group">
      <button class="btn-secondary" onclick="goToScreen(13)">← Back</button>
      <button onclick="goToScreen(15)" id="btn14" disabled>Next →</button>
    </div>
  </div>

  <!-- Screen 15: Future Episode Preview (Extended only) -->
  <div class="screen" id="screen15">
    <div class="journey-map" id="journeyMap15"></div>
    <h1 id="h15"></h1>
    <div class="section-box" id="futureBox"></div>
    <div class="button-group">
      <button class="btn-secondary" onclick="goToScreen(14)">← Back</button>
      <button id="btn15next" onclick="goToScreen16()">Complete Mission →</button>
    </div>
  </div>

  <!-- Screen 16: Completion & Options -->
  <div class="screen" id="screen16">
    <div class="achievement-card">
      <div class="achievement-icon">✓</div>
      <div class="achievement-title" id="h16"></div>
      <div class="achievement-desc" id="p16desc"></div>
    </div>
    <div id="completionOpts"></div>
  </div>

  <!-- Screen 17: Export & End -->
  <div class="screen" id="screen17">
    <div style="text-align: center; padding: 2rem 0;">
      <div style="font-size: 3rem; margin-bottom: 1rem;">🎉</div>
      <h1 id="h17" style="font-size: 2rem; margin-bottom: 0.5rem;"></h1>
      <p style="font-size: 1.1rem; color: #666; margin-bottom: 2rem;" id="p17end"></p>
    </div>
    
    <div style="background: linear-gradient(135deg, #f9f9f9 0%, #f5f5f5 100%); border: 2px solid #000; border-radius: 4px; padding: 1.5rem; margin: 1.5rem 0; text-align: center;">
      <p id="p17thanks" style="font-size: 0.95rem; line-height: 1.8; margin: 0;"></p>
    </div>
    
    <h2 style="margin-top: 2rem;">📥 <span id="lJsonExport"></span></h2>
    <div class="form-group">
      <textarea id="jsonOutput" readonly style="font-size: 0.75rem; min-height: 120px;"></textarea>
    </div>
    
    <div class="button-group">
      <button onclick="downloadJSON()">📥 Download JSON</button>
      <button class="btn-secondary" onclick="downloadCSV()">📥 Download CSV</button>
      <button class="btn-secondary" onclick="restartMission()" style="flex: 1; margin-top: 1rem;">← Zurück zur Mission / Back to Mission</button>
    </div>
    
    <div style="text-align: center; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #ddd; color: #999; font-size: 0.85rem;">
      <p id="p17footer"></p>
    </div>
  </div>

</div>

<script>
  const text = {
    DE: {
      welcome: { h: "LCM Communication Explorer", c: "Diese Studie untersucht, wie KI-Systeme Menschen verstehen. Sie werden mehrere Kommunikationsmissionen durchlaufen und beobachten, wie unterschiedliche Reflexionsschritte die Qualität von Antworten beeinflussen." },
      research: { h: "Wähle deinen Forschungsmodus", d: "LCM-Light testet Basis-Reflexion (3 Missionen). LCM Extended erforscht auch, wie die KI aus Kommunikation lernt (5 Missionen)." },
      consent: { h: "Einverständnis", c: "Deine Teilnahme ist freiwillig. Daten werden anonymisiert. Keine echten Daten eingeben.", l: "Ich stimme zu." },
      info: { h: "Über dich", lAge: "Alter:", lAiExp: "KI-Erfahrung:", opts: ["nie", "selten", "gelegentlich", "häufig", "täglich"] },
      llm: { h: "Dein KI-Modell", l: "Welches Modell nutzt du?" },
      mission: { h: "Deine Kommunikationsmission", label: "Kontext", c: "In den folgenden Missionen untersuchen wir, wie KI-Systeme Menschen verstehen. Deine Aufgabe: Gehe gemeinsam mit einer KI eine Kommunikationssituation durch. Das Ziel ist nicht die perfekte Antwort, sondern zu beobachten, wie unterschiedliche Kommunikationsmodelle die Qualität beeinflussen." },
      step7: { label: "Mission 1", h: "Verstehe die Person", why: "Die meisten KI-Systeme antworten sofort. Wir möchten testen, ob Antworten besser werden, wenn die KI zuerst versucht zu verstehen, wer die Person ist und was sie wirklich möchte.", task: "Deine Aufgabe", inst: "Kopiere den Prompt in dein gewähltes KI-Modell. Füge anschließend die erzeugte Analyse ein:", l: "Partner-Modell:" },
      step8: { label: "Mission 2", h: "Verstehe dich selbst", why: "Menschen überlegen oft, welche Rolle sie in einem Gespräch einnehmen. Wir testen: Werden Antworten besser, wenn die KI zuerst ihre eigene Kommunikationsrolle reflektiert?", task: "Deine Aufgabe", inst: "Kopiere den Prompt in dein KI-Modell. Das Partner-Modell wird automatisch eingefügt:", l: "Self-Modell:" },
      step9: { label: "Mission 3", h: "Verstehe die Kommunikation", why: "Bisher haben wir die Person und die KI betrachtet. Jetzt betrachten wir die Kommunikation selbst. Was ist das gemeinsame Ziel? Welche Missverständnisse könnten entstehen?", task: "Deine Aufgabe", inst: "Kopiere den Prompt in dein KI-Modell:", l: "Kommunikationsmodell:" },
      step10: { label: "Mission 4", h: "Generiere die Antwort", inst: "Kopiere diesen Prompt in dein KI-Modell. Es nutzt alle bisherigen Modelle:", l: "Finale Antwort:" },
      eval: { h: "Jetzt brauchen wir deine Einschätzung", c: "Es gibt keine richtige oder falsche Antwort. Uns interessiert, wie die Antwort aus deiner Sicht wirkt. Deine Bewertung hilft uns zu verstehen, welche Kommunikationsansätze Menschen als hilfreicher empfinden.", inst: "Bitte bewerte die Antwort. 1 = stimme gar nicht zu. 7 = stimme vollständig zu." },
      ratings: [
        { name: "understanding", label: "Die Antwort hat mein Anliegen verstanden." },
        { name: "personalization", label: "Die Antwort war auf meine Situation zugeschnitten." },
        { name: "helpfulness", label: "Die Antwort war hilfreich." },
        { name: "trust", label: "Ich vertraue dieser Antwort." },
        { name: "clarity", label: "Die Antwort war klar und verständlich." },
        { name: "emotional_fit", label: "Die Antwort war emotional passend." }
      ],

  if (el9) el9.addEventListener('input', () => { document.getElementById('btn9').disabled = !document.getElementById('output9').value; });
  
  const el14 = document.getElementById('output14');
  if (el14) el14.addEventListener('input', () => { document.getElementById('btn14').disabled = !document.getElementById('output14').value; });

  function goToScreen16() {
    saveCurrentScreen();
    state.timestamp_completed = new Date().toISOString();
    runs.push({...state});
    currentScreen = 16;
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen16').classList.add('active');
    renderCompletion();
  }

  function renderCompletion() {
    const t = text[lang];
    document.getElementById('h16').textContent = t.complete.h;
    document.getElementById('p16desc').textContent = t.complete.desc;
    let opts = `<p style="margin: 1.5rem 0; font-weight: 600;">${t.complete.opts}</p><div class="completion-options">`;
    opts += `<div class="completion-opt" onclick="selectNextAction('light')"><strong>🔄</strong><br>${t.complete.opt1}</div>`;
    opts += `<div class="completion-opt" onclick="selectNextAction('scenario')"><strong>🗺️</strong><br>${t.complete.opt2}</div>`;
    opts += `<div class="completion-opt" onclick="selectNextAction('end')"><strong>📥</strong><br>${t.complete.opt3}</div>`;
    opts += `</div>`;
    document.getElementById('completionOpts').innerHTML = opts;
  }

  function selectNextAction(action) {
    if (action === 'end') {
      participants.push({...state, runs});
      localStorage.setItem('lcm_participants', JSON.stringify(participants));
      currentScreen = 17;
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen17').classList.add('active');
      updateUI();
      generateJSON();
      window.scrollTo(0, 0);
    } else {
      // Reset for next run
      const newMode = action === 'light' ? 'light' : 'extended';
      mode = newMode;
      state.research_mode = mode;
      state.partner_model = state.self_model = state.communication_model = state.final_answer = state.feedback = state.experience_object = '';
      state.ratings = {};
      state.timestamp_started = new Date().toISOString();
      goToScreen(6);
    }
  }

  function goToScreen(num) {
    if (currentScreen === 3 && !document.getElementById('consent').checked) return;
    if (currentScreen === 4) {
      if (!document.getElementById('age').value || !document.getElementById('aiExp').value) return;
    }
    if (currentScreen === 5) {
      if (!document.getElementById('llmSelect').value) return;
    }
    saveCurrentScreen();
    currentScreen = num;
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    if (document.getElementById(`screen${currentScreen}`)) {
      document.getElementById(`screen${currentScreen}`).classList.add('active');
    }
    updateUI();
    updateJourneyMaps();
    window.scrollTo(0, 0);
  }

  function updateJourneyMaps() {
    for (let i = 1; i <= 17; i++) {
      const map = document.getElementById(`journeyMap${i}`);
      if (map) map.innerHTML = buildJourneyMap(i);
    }
  }

  function saveCurrentScreen() {
    if (currentScreen === 4) { state.age = document.getElementById('age').value; state.ai_experience = document.getElementById('aiExp').value; }
    if (currentScreen === 5) { state.selected_llm = document.getElementById('llmSelect').value; }
    if (currentScreen === 7) state.partner_model = document.getElementById('output7').value;
    if (currentScreen === 8) state.self_model = document.getElementById('output8').value;
    if (currentScreen === 9) state.communication_model = document.getElementById('output9').value;
    if (currentScreen === 10) state.final_answer = document.getElementById('output10').value;
    if (currentScreen === 13) state.feedback = document.getElementById('feedback').value;
    if (currentScreen === 14) state.experience_object = document.getElementById('output14').value;
  }

  function goToScreen16() {
    saveCurrentScreen();
    state.timestamp_completed = new Date().toISOString();
    runs.push({...state});
    currentScreen = 16;
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen16').classList.add('active');
    renderCompletion();
    window.scrollTo(0, 0);
  }

  function restartMission() {
    // Reset to start
    currentScreen = 0;
    mode = null;
    state.research_mode = null;
    state.partner_model = state.self_model = state.communication_model = state.final_answer = state.feedback = state.experience_object = '';
    state.ratings = {};
    state.timestamp_started = new Date().toISOString();
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen0').classList.add('active');
    window.scrollTo(0, 0);
  }

  function copyToClipboard(id) { navigator.clipboard.writeText(document.getElementById(id).textContent).then(() => alert(lang === 'DE' ? '✓ Kopiert' : '✓ Copied')); }

  function generateJSON() { document.getElementById('jsonOutput').value = JSON.stringify({participant: state, all_runs: runs}, null, 2); }
  function downloadJSON() { const json = JSON.stringify({participant: state, all_runs: runs}, null, 2); const blob = new Blob([json], { type: 'application/json' }); const url = URL.createObjectURL(blob); const link = document.createElement('a'); link.href = url; link.download = `lcm_${state.participant_id}.json`; link.click(); }
  function downloadCSV() {
    const headers = ['participant_id', 'language', 'mode', 'run_num', 'age', 'ai_experience', 'llm', 'understanding', 'personalization', 'helpfulness', 'trust', 'clarity', 'emotional_fit', 'timestamp_started', 'timestamp_completed'];
    const rows = [headers.map(h => `"${h}"`).join(',')];
    runs.forEach((r, i) => { rows.push([r.participant_id, r.participant_language, r.research_mode, i+1, r.age, r.ai_experience, r.selected_llm, r.ratings.understanding || '', r.ratings.personalization || '', r.ratings.helpfulness || '', r.ratings.trust || '', r.ratings.clarity || '', r.ratings.emotional_fit || '', r.timestamp_started, r.timestamp_completed].map(v => `"${v}"`).join(',')); });
    const csv = rows.join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `lcm_${state.participant_id}.csv`;
    link.click();
  }

  // Event Listeners
  document.getElementById('consent').addEventListener('change', (e) => { document.getElementById('btn3').disabled = !e.target.checked; });
  document.getElementById('age').addEventListener('input', () => { const ok = document.getElementById('age').value && document.getElementById('aiExp').value; document.getElementById('btn4').disabled = !ok; });
  document.getElementById('aiExp').addEventListener('change', () => { const ok = document.getElementById('age').value && document.getElementById('aiExp').value; document.getElementById('btn4').disabled = !ok; });
  document.getElementById('llmSelect').addEventListener('change', (e) => { document.getElementById('otherLLMGroup').style.display = e.target.value === 'other' ? 'block' : 'none'; document.getElementById('btn5').disabled = !e.target.value; });

  ['output7', 'output8', 'output9', 'output10', 'output14'].forEach(id => { 
    const el = document.getElementById(id); 
    if (el) el.addEventListener('input', () => { 
      const btnId = 'btn' + id.replace('output', ''); 
      if (document.getElementById(btnId)) document.getElementById(btnId).disabled = !document.getElementById(id).value; 
    }); 
  });

  updateUI();
</script>

</body>
</html>
